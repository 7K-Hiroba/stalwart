name: Bootstrap Artifact Hub

on:
  workflow_dispatch:

permissions:
      contents: write
      pull-requests: write

jobs:
  bootstrap:
    uses: 7K-Hiroba/workflows-library/.github/workflows/bootstrap-artifacthub.yml@fx/test-artifacthub-bootstrap
    with:
      org: 7k-hiroba
      registry-base: harbor.7kgroup.org/7khiroba/charts
      charts: |
        [
          { "file": "helm/base-artifacthub-repo.yml",
            "chart": "stalwart",
            "displayName": "stalwart" },
          { "file": "helm/platform-artifacthub-repo.yml",
            "chart": "stalwart-platform",
            "displayName": "stalwart — platform" }
        ]
    secrets: inherit

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stalwart
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hiroba
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/7K-Hiroba/stalwart.git
      targetRevision: feat/initial-commit-helm-chart
      path: helm/base
      helm:
        valueFiles:
          - values.yaml
        values: |
          # Test overrides — keep the deploy self-contained so we can
          # validate the chart without needing a parent Gateway, internet
          # mail exposure, or large PVCs.
          gateway:
            enabled: false
          service:
            type: ClusterIP
          persistence:
            config:
              size: 1Gi
              storageClass: longhorn-nvme
            data:
              size: 5Gi
              storageClass: longhorn-nvme
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi

    - repoURL: https://github.com/7K-Hiroba/stalwart.git
      targetRevision: feat/initial-commit-helm-chart
      path: helm/platform
      helm:
        valueFiles:
          - values.yaml
        # Platform features all default to enabled: false, so the chart
        # renders empty until specific operators are wired in. Leave the
        # values block out for now — flip flags once CNPG / ESO / Prometheus
        # operator presence is confirmed in the target cluster.

  destination:
    server: https://kubernetes.default.svc
    namespace: stalwart

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

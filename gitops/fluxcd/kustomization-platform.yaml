apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stalwart-platform
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: hiroba
spec:
  interval: 10m
  targetNamespace: stalwart
  sourceRef:
    kind: GitRepository
    name: stalwart
  path: ./helm/platform
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: stalwart

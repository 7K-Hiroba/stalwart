{{- if .Values.nats.enabled }}
{{- $name := printf "%s-nats" (include "platform.name" .) }}
{{- $authSecret := .Values.nats.auth.existingSecret | default $name }}
{{/*
NATS server provisioning for the Stalwart Coordinator JMAP object.

Inline manifests rather than a subchart: matches the platform chart's
"raw resources, no helm dependencies" pattern (CNPG Cluster, Crossplane
Bucket, etc.). Minimal config — core NATS pub/sub, no JetStream — because
the coordinator role does not need persistence.

Cluster routes are wired only when replicas > 1; single-replica mode runs
NATS standalone and skips the cluster block to avoid noise in the logs.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.natsLabels" . | nindent 4 }}
data:
  nats-server.conf: |
    listen: 0.0.0.0:4222
    http_port: 8222
    server_name: $POD_NAME

    {{- if .Values.nats.auth.enabled }}
    authorization {
      token: $NATS_TOKEN
    }
    {{- end }}

    {{- if gt (int .Values.nats.replicas) 1 }}
    cluster {
      name: {{ $name }}
      listen: 0.0.0.0:6222
      routes [
      {{- range $i := until (int .Values.nats.replicas) }}
        nats://{{ $name }}-{{ $i }}.{{ $name }}-headless.{{ $.Release.Namespace }}.svc.cluster.local:6222
      {{- end }}
      ]
    }
    {{- end }}
---
{{- if and .Values.nats.auth.enabled (not .Values.nats.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.natsLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.nats.auth.tokenKey }}: {{ .Values.nats.auth.token | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.natsLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 4222
      targetPort: client
      protocol: TCP
    {{- if .Values.nats.metrics.enabled }}
    - name: monitor
      port: 8222
      targetPort: monitor
      protocol: TCP
    {{- end }}
  selector:
    {{- include "platform.natsSelectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-headless
  labels:
    {{- include "platform.natsLabels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 4222
      targetPort: client
      protocol: TCP
    - name: cluster
      port: 6222
      targetPort: cluster
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: monitor
      protocol: TCP
  selector:
    {{- include "platform.natsSelectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.natsLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nats.replicas }}
  serviceName: {{ $name }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "platform.natsSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        config-hash: {{ printf "%v|%v|%v" .Values.nats.replicas .Values.nats.auth $authSecret | sha256sum }}
      labels:
        {{- include "platform.natsLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.nats.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/nats/nats-server.conf"
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: cluster
              containerPort: 6222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.nats.auth.enabled }}
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecret }}
                  key: {{ .Values.nats.auth.tokenKey }}
            {{- end }}
          # NATS exposes /healthz on the monitor port for both liveness and
          # readiness — different parameters reflect different SLOs (slow
          # restart vs. fast traffic-shifting).
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nats
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
{{- end }}

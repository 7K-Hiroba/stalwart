suite: NATS Coordinator
templates:
  - templates/coordinator/nats.yaml
tests:
  - it: is omitted by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ConfigMap, two Services, and StatefulSet when enabled
    set:
      nats.enabled: true
    asserts:
      - hasDocuments:
          count: 4

  - it: single-replica config omits the cluster routes block
    set:
      nats.enabled: true
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - notMatchRegex:
          path: data["nats-server.conf"]
          pattern: "cluster"
      - notMatchRegex:
          path: data["nats-server.conf"]
          pattern: "routes"

  - it: multi-replica config wires cluster routes for each pod
    set:
      nats.enabled: true
      nats.replicas: 3
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["nats-server.conf"]
          pattern: "cluster \\{"
      - matchRegex:
          path: data["nats-server.conf"]
          pattern: 'nats://stalwart-nats-0\.stalwart-nats-headless\..+:6222'
      - matchRegex:
          path: data["nats-server.conf"]
          pattern: 'nats://stalwart-nats-2\.stalwart-nats-headless\..+:6222'

  - it: enables token auth when nats.auth.enabled is true
    set:
      nats.enabled: true
      nats.auth.enabled: true
    documentSelector:
      path: kind
      value: ConfigMap
    asserts:
      - matchRegex:
          path: data["nats-server.conf"]
          pattern: 'authorization \{'
      - matchRegex:
          path: data["nats-server.conf"]
          pattern: 'token: \$NATS_TOKEN'

  - it: creates an auth Secret when auth is enabled and no existingSecret is set
    set:
      nats.enabled: true
      nats.auth.enabled: true
      nats.auth.token: "supersecret"
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - equal:
          path: stringData.token
          value: supersecret

  - it: skips creating a Secret when existingSecret is provided
    set:
      nats.enabled: true
      nats.auth.enabled: true
      nats.auth.existingSecret: my-managed-secret
    asserts:
      - hasDocuments:
          count: 4

  - it: StatefulSet wires NATS_TOKEN env from the auth Secret when auth is enabled
    set:
      nats.enabled: true
      nats.auth.enabled: true
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NATS_TOKEN
            valueFrom:
              secretKeyRef:
                name: stalwart-nats
                key: token

  - it: StatefulSet replicas track nats.replicas
    set:
      nats.enabled: true
      nats.replicas: 5
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - equal:
          path: spec.replicas
          value: 5
      - equal:
          path: spec.serviceName
          value: stalwart-nats-headless

  - it: client Service exposes the monitor port only when metrics is enabled
    set:
      nats.enabled: true
      nats.metrics.enabled: true
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: stalwart-nats
      - contains:
          path: spec.ports
          content:
            name: monitor
            port: 8222
            targetPort: monitor
            protocol: TCP

  - it: client Service omits the monitor port when metrics is disabled
    set:
      nats.enabled: true
    documentIndex: 1
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: monitor
            port: 8222
            targetPort: monitor
            protocol: TCP

  - it: headless Service always exposes the cluster port
    set:
      nats.enabled: true
    documentSelector:
      path: metadata.name
      value: stalwart-nats-headless
    asserts:
      - equal:
          path: spec.clusterIP
          value: None
      - contains:
          path: spec.ports
          content:
            name: cluster
            port: 6222
            targetPort: cluster
            protocol: TCP

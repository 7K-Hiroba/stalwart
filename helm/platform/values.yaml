# Platform chart for Stalwart.
#
# Stalwart can run with embedded RocksDB / SQLite for everything, but homelab
# deployments at any meaningful scale benefit from offloading the data store to
# PostgreSQL and the blob store (mail bodies, attachments, Sieve scripts) to S3.
# Both are gated behind `enabled: false` flags — turn on what you need.
#
# Each resource supports a `provider` switch to select the backend implementation.
# Available providers are listed per resource — add your own by creating a
# matching template file in templates/<category>/<resource>-<provider>.yaml
#
# Templates are organized into subdirectories:
#   database/    — PostgreSQL via CNPG (Stalwart data store backend)
#   storage/     — S3 blob storage (Stalwart blob store backend)
#   secrets/     — ExternalSecrets for admin password, DB creds, encryption keys
#   observability/ — ServiceMonitor, Grafana dashboard, PrometheusRules

global:
  # -- Application name, used as prefix for all platform resources
  appName: stalwart
  # -- Release name of the base chart deployment. When set, the ServiceMonitor
  # selector matches `app.kubernetes.io/instance: <baseInstance>` so multiple
  # releases of the same app coexist safely. Leave empty to match by name only.
  baseInstance: ""

# -- PostgreSQL data store (Stalwart `data-store` backend).
# Holds account metadata, mailbox state, ACLs, sessions. Disable to fall back to
# Stalwart's embedded RocksDB / SQLite store managed inside the data PVC.
postgres:
  enabled: false
  # -- Provider: "cnpg" (CloudNativePG operator)
  provider: cnpg
  instances: 1
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  # -- PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  # -- Database name to create
  database: stalwart
  # -- Database owner
  owner: stalwart
  # -- Backup configuration (optional)
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retentionPolicy: "7d"

# -- S3-compatible blob storage (Stalwart `blob-store` backend).
# Holds raw message bytes, attachments, and Sieve scripts. For homelab use cases
# without an S3 backend, leave disabled — Stalwart will store blobs on the data
# PVC instead.
s3:
  enabled: false
  # -- Provider: "crossplane" | "garage"
  provider: garage
  # -- Bucket name (will be prefixed with app name)
  bucketName: blob
  # -- Access control
  acl: private

  # -- Crossplane-specific settings (provider: crossplane)
  crossplane:
    region: us-east-1
    providerConfigRef: aws-provider
    lifecycle:
      enabled: false
      expirationDays: 90

  # -- Garage-specific settings (provider: garage)
  garage:
    # -- Garage API endpoint
    endpoint: "http://garage.garage.svc.cluster.local:3900"
    # -- Garage access key Secret reference
    accessKeySecret:
      name: ""
      key: accessKey
    # -- Garage secret key Secret reference
    secretKeySecret:
      name: ""
      key: secretKey
    # -- Number of data/parity replicas in Garage
    replicationFactor: 3

# -- NATS coordinator (Stalwart `Coordinator` JMAP object backend).
# Stalwart 0.16+ stores cluster pub/sub coordination state in NATS, Redis,
# Kafka, or Zenoh. NATS is one option among several; the upstream Stalwart
# image is also compiled with Redis support, so users who already run Redis
# as the in-memory store can pick `Coordinator: Default` and skip this block.
#
# This chart provisions a minimal NATS server (no JetStream — the coordinator
# only needs core pub/sub) using inline manifests. Use `replicas: 3` for HA;
# the StatefulSet wires the cluster routes automatically.
#
# The base chart consumes this through env vars (STALWART_NATS_URL,
# STALWART_NATS_TOKEN). The Coordinator JMAP object itself must be applied
# via `stalwart-cli apply` — see the install NOTES.txt for a sample plan.
nats:
  enabled: false
  # -- Replica count. Set to 1 for single-node, 3+ for HA (clustered routes).
  replicas: 1
  image:
    repository: docker.io/library/nats
    pullPolicy: IfNotPresent
    # -- Image tag (NATS server version). Pinned to a recent stable release.
    tag: "2.10-alpine"
  # -- Pod resources. The coordinator workload is light (pub/sub, no JetStream).
  resources:
    limits:
      cpu: "500m"
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  storage:
    # NATS coordinator state is in-memory; no PVC is needed unless JetStream is
    # enabled (which this chart does not). Left here for future extension.
    enabled: false
    size: 1Gi
    storageClass: ""
  # -- Token-based auth. When enabled, NATS requires the token on every client
  # connection; the Stalwart pod's STALWART_NATS_TOKEN env var carries it.
  # Defaults to off for in-cluster traffic; turn on for shared clusters.
  auth:
    enabled: false
    # -- Reference to an existing Secret containing the token. Leave blank to
    # let the chart create one (token value via `auth.token`). When using
    # ExternalSecrets / SealedSecrets, set existingSecret and ignore `token`.
    existingSecret: ""
    tokenKey: token
    # -- Plain token written into a chart-managed Secret. Override in production
    # — the default is a placeholder, not a generated random.
    token: "change-me-please"
  # -- ServiceMonitor exposure for the NATS /healthz and stats endpoints.
  metrics:
    enabled: false

# -- External Secrets (external-secrets.io)
externalSecrets:
  enabled: false
  # -- How often to sync secrets
  refreshInterval: 1h
  # -- SecretStore or ClusterSecretStore reference
  storeRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  # -- Individual secret mappings. Key names align with the EnvironmentVariable
  # references the base chart's config.json uses. Reference this Secret from
  # the base chart via `envFrom: [{ secretRef: { name: <release>-stalwart } }]`.
  data: []
  #  - secretKey: STALWART_RECOVERY_ADMIN     # user:password — first-install only
  #    remoteKey: stalwart/recovery-admin
  #  - secretKey: STALWART_DATA_PASSWORD      # referenced by config.json
  #    remoteKey: stalwart/postgres
  #    property: password
  #  - secretKey: STALWART_BLOB_ACCESS_KEY    # for S3 blob backend (provisioned via apply)
  #    remoteKey: stalwart/s3
  #    property: accessKey
  #  - secretKey: STALWART_BLOB_SECRET_KEY
  #    remoteKey: stalwart/s3
  #    property: secretKey
  # -- Pull all keys from a remote path
  dataFrom: []
  #  - extract:
  #      key: myapp/config
  # -- Optional target Secret template for value transformation.
  # See https://external-secrets.io/latest/guides/templating/
  target:
    template: {}
    # type: Opaque
    # data:
    #   DATABASE_URL: "postgres://{{ `{{ .username }}` }}:{{ `{{ .password }}` }}@host/{{ `{{ .database }}` }}"

# -- Observability resources
observability:
  # -- Prometheus ServiceMonitor
  serviceMonitor:
    enabled: false
    # -- Additional labels for ServiceMonitor discovery (e.g., release: kube-prometheus-stack)
    additionalLabels: {}
    # -- Service port name to scrape
    port: http
    # -- Metrics endpoint path
    path: /metrics
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s

  # -- Grafana dashboard (deployed as ConfigMap with sidecar label)
  grafanaDashboard:
    enabled: false
    # -- Grafana folder label
    folderLabel: ""

  # -- PrometheusRule alerts. `groups` is passed through `tpl` so values can
  # reference `.Release.Namespace`, `include "platform.name" .`, etc. Override
  # entirely to replace the defaults, or append to extend them.
  #
  # The defaults below use availability-style alerts that don't depend on
  # specific Stalwart metric names — `up == 0` (the scrape itself failing) and
  # container restarts. Once you've confirmed which metrics your Stalwart build
  # exposes (e.g. `stalwart_smtp_received_total`,
  # `stalwart_imap_active_sessions`), add protocol-specific alerts on top.
  prometheusRules:
    enabled: false
    groups:
      - name: '{{ include "platform.name" . }}.rules'
        rules:
          - alert: StalwartDown
            expr: |
              up{namespace="{{ .Release.Namespace }}", service="{{ include "platform.name" . }}"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: 'Stalwart instance {{`{{ $labels.instance }}`}} is down'
              description: "Prometheus has not been able to scrape Stalwart for 5 minutes."
          - alert: StalwartContainerRestarting
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~"{{ include "platform.name" . }}-.*"}[15m]) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: 'Stalwart container restarting in {{`{{ $labels.pod }}`}}'
              description: "Container has restarted more than twice in the last 15 minutes — likely a crash loop."

suite: Deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the correct image
    set:
      image.repository: ghcr.io/example/stalwart
      image.tag: "v0.99.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/example/stalwart:v0.99.0"

  - it: falls back to appVersion when tag is empty
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":v0\\.16\\.1$"

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: defaults to Recreate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: applies pod security context with stalwart UID 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 2000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000

  - it: applies container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: sets resource limits and requests
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests

  - it: exposes all stalwart ports
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: smtp
            containerPort: 25
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: imaps
            containerPort: 993
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: sieve
            containerPort: 4190
            protocol: TCP

  - it: mounts config and data volumes by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/stalwart
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/stalwart
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: RELEASE-NAME-stalwart-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-stalwart-data

  - it: skips persistent volumes when persistence is disabled
    set:
      persistence.config.enabled: false
      persistence.data.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: RELEASE-NAME-stalwart-config
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-stalwart-data
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/stalwart
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/stalwart

  - it: renders env vars when set
    set:
      env:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar

  - it: renders envFrom for secret injection
    set:
      envFrom:
        - secretRef:
            name: stalwart-creds
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: stalwart-creds

  - it: appends extra volumes and mounts
    set:
      extraVolumes:
        - name: tmp
          emptyDir: {}
      extraVolumeMounts:
        - name: tmp
          mountPath: /tmp
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: renders pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: probes hit the http port on healthz endpoints
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz/live
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /healthz/ready

suite: HTTPRoute
templates:
  - templates/httproute.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1

  - it: is not rendered when gateway is disabled
    set:
      gateway.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sets parent gateway reference
    set:
      gateway.parentRefs:
        - name: my-gateway
          namespace: gateway-system
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system

  - it: sets hostnames
    set:
      gateway.hostnames:
        - mail.example.com
        - jmap.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: "mail.example.com"
      - equal:
          path: spec.hostnames[1]
          value: "jmap.example.com"

  - it: renders catch-all rule pointing at the http port
    set:
      gateway.rules: []
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: tracks a custom http port number on the backendRef
    set:
      service.ports.http: 9000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9000

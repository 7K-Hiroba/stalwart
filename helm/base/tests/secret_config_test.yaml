suite: Secret (config.json)
templates:
  - templates/secret-config.yaml
tests:
  - it: renders a Secret holding config.json
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stalwart-config
      - equal:
          path: type
          value: Opaque

  - it: defaults to embedded RocksDB at /var/lib/stalwart
    asserts:
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"@type":"RocksDb"'
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"path":"/var/lib/stalwart"'

  - it: renders a Postgres data store with EnvironmentVariable secret refs
    set:
      config:
        "@type": Postgres
        host: pg.example.svc
        port: 5432
        database: stalwart
        user: stalwart
        password:
          "@type": EnvironmentVariable
          variableName: STALWART_DATA_PASSWORD
    asserts:
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"@type":"Postgres"'
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"variableName":"STALWART_DATA_PASSWORD"'
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"@type":"EnvironmentVariable"'

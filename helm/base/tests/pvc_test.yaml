suite: PersistentVolumeClaims
templates:
  - templates/pvc.yaml
tests:
  - it: creates a PVC for config and data by default
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        isKind:
          of: PersistentVolumeClaim

  - it: creates only the data PVC when config is disabled
    set:
      persistence.config.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-stalwart-data

  - it: creates no PVCs when persistence is fully disabled
    set:
      persistence.config.enabled: false
      persistence.data.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: applies size and storageClass overrides
    set:
      persistence.data.size: 100Gi
      persistence.data.storageClass: fast-ssd
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-stalwart-data
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 100Gi
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: omits storageClassName when not set (uses cluster default)
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-stalwart-config
    asserts:
      - isNull:
          path: spec.storageClassName

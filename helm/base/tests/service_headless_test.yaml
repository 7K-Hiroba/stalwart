suite: Headless Service
templates:
  - templates/service-headless.yaml
tests:
  - it: renders a headless Service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stalwart-headless
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: exposes all stalwart ports on the headless service
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: smtp
            port: 25
            targetPort: smtp
            protocol: TCP

  - it: skips rendering when headlessService.enabled is false
    set:
      headlessService.enabled: false
    asserts:
      - hasDocuments:
          count: 0

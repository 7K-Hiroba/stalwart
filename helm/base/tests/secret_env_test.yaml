suite: Secret (env)
templates:
  - templates/secret-env.yaml
tests:
  - it: is omitted by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when secrets.create is true
    set:
      secrets.create: true
      secrets.env:
        STALWART_DATA_PASSWORD: changeme
        STALWART_BLOB_SECRET_KEY: alsochangeme
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stalwart-env
      - equal:
          path: stringData.STALWART_DATA_PASSWORD
          value: changeme
      - equal:
          path: stringData.STALWART_BLOB_SECRET_KEY
          value: alsochangeme

  - it: renders an empty Secret when secrets.create is true with no env
    set:
      secrets.create: true
    asserts:
      - hasDocuments:
          count: 1
      - isNull:
          path: stringData

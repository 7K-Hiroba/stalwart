{{/*
Stalwart's startup config. The 0.16+ binary deserializes /etc/stalwart/config.json
as a single DataStore tagged-union object — see crates/store/src/registry/local.rs.
Stored as a Secret rather than a ConfigMap so inline credentials (when not using
EnvironmentVariable refs) don't sit in cleartext on the API server.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-config
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
type: Opaque
stringData:
  config.json: |
    {{- .Values.config | toJson | nindent 4 }}

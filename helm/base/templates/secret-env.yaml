{{- if .Values.secrets.create }}
{{/*
Self-managed env Secret. Disabled by default — use external-secrets.io or
SealedSecrets for production and reference the result through `envFrom`.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-env
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: env
type: Opaque
{{- with .Values.secrets.env }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}

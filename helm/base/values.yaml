# Default values for stalwart
#
# Stalwart is an all-in-one mail & collaboration server (SMTP, IMAP, POP3, JMAP,
# CalDAV, CardDAV, WebDAV, ManageSieve). The container exposes HTTP-based
# protocols on port 8080 and raw TCP for the mail family. The base chart wires
# every port through a single Service; the HTTPRoute attaches only to the HTTP
# port — mail TCP ports are reached by the in-cluster Service or, when
# `service.type: LoadBalancer`, by the cloud LB that fronts it.
#
# CONFIGURATION MODEL (Stalwart 0.16+)
#
# In 0.16 only the data store lives on disk (`/etc/stalwart/config.json`);
# everything else (blob/FTS/in-memory stores, listeners, OIDC, DKIM, accounts)
# lives inside the data store as JMAP objects and is provisioned with
# `stalwart-cli apply` against the management endpoint. This chart renders
# `config.json` from `values.config` into a Secret and mounts it; secrets are
# referenced inline as `{"@type":"EnvironmentVariable","variableName":"X"}`
# and resolved at startup from envFrom-injected values.
#
# Bootstrapping the rest (listeners/OIDC/DKIM/accounts) is NOT yet automated by
# this chart — port-forward to the management port and run `stalwart-cli apply`
# or use the WebUI on first install.

replicaCount: 1

image:
  repository: docker.io/stalwartlabs/stalwart
  pullPolicy: IfNotPresent
  # Pinned upstream tag — falls back to Chart.appVersion when empty
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# Stalwart's upstream Dockerfile creates user `stalwart` with UID/GID 2000
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000

# Stalwart needs to bind privileged ports (25, 110, 143, 443, 465, 587, 993, 995)
# but the upstream image grants this through `setcap cap_net_bind_service` on the
# binary, so the container can stay non-root with no Linux capabilities added.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# StatefulSet update strategy — StatefulSet supports RollingUpdate (default,
# pod-by-pod with ordinal ordering) and OnDelete (manual). Recreate isn't a
# StatefulSet option; HA scale-out also requires an external data store.
updateStrategy:
  type: RollingUpdate

# StatefulSet pod-management policy. Parallel speeds up scale events but
# breaks ordered-by-ordinal startup; OrderedReady (the default) is correct for
# clusters where node N+1 must wait for node N to be ready.
podManagementPolicy: OrderedReady

service:
  type: ClusterIP
  # External traffic policy — set to "Local" with type: LoadBalancer to preserve
  # client source IPs (relevant for SMTP greylisting / abuse tracking).
  externalTrafficPolicy: ""
  # All Stalwart-served ports. Names match Stalwart's protocol terminology and
  # are used for both Service ports and the container ports they target.
  ports:
    http: 8080
    smtp: 25
    submission: 587
    submissions: 465
    imap: 143
    imaps: 993
    pop3: 110
    pop3s: 995
    sieve: 4190
  annotations: {}

# Headless Service for StatefulSet identity (stable per-pod DNS like
# stalwart-0.stalwart-headless.<ns>.svc.cluster.local). Required by
# StatefulSet.serviceName; needed for any clustered deployment so peers can
# discover each other. Cheap to keep on for single-replica too.
headlessService:
  enabled: true
  annotations: {}

# Gateway API HTTPRoute — covers HTTP-based access (admin UI, JMAP, CalDAV,
# CardDAV, WebDAV). Mail TCP traffic does not flow through the Gateway.
gateway:
  enabled: true
  annotations: {}
  # -- Parent Gateway references
  parentRefs:
    - name: default-gateway
      # namespace: gateway-system
      # sectionName: https
  # -- Hostnames to match
  hostnames:
    - mail.example.com
  # -- Routing rules (omit for a simple catch-all route to the http port)
  rules: []

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Stalwart's `/healthz/live` is served on the HTTP port (8080)
livenessProbe:
  httpGet:
    path: /healthz/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5

# HPA off — Stalwart is stateful (RWO persistence, in-process queues) and does
# not horizontally scale without an external data backend.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# -- Pod Disruption Budget. Only meaningful when running more than one replica.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Persistent volume for Stalwart's data directory (/var/lib/stalwart). Backs the
# embedded data/blob/FTS stores when not pointed at PostgreSQL/S3, plus session
# queues/temp state. Rendered as a StatefulSet `volumeClaimTemplates` entry.
# The 0.15-era /etc/stalwart PVC is gone — config now lives in `values.config`,
# rendered into a Secret at install time.
persistence:
  data:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    annotations: {}

# config.json content. Rendered to JSON, stored in a Secret, mounted at
# /etc/stalwart/config.json. Stalwart 0.16 deserializes this as a single
# DataStore object; everything else is in the registry DB.
#
# Secret references use the inline tagged-union form Stalwart expects:
#
#   password:
#     "@type": EnvironmentVariable
#     variableName: STALWART_DATA_PASSWORD
#
# or
#
#   password:
#     "@type": File
#     filePath: /var/run/secrets/stalwart/db-password
#
# Inline plaintext (`password: "literal"`) works but is discouraged — the
# rendered Secret would carry the credential in cleartext base64.
#
# Defaults to embedded RocksDB at /var/lib/stalwart (the data PVC mount point).
# Switch to `Postgres` and inject credentials via envFrom for an external store.
config:
  "@type": RocksDb
  path: /var/lib/stalwart
  # Postgres example:
  # "@type": Postgres
  # host: stalwart-pg-rw.stalwart.svc.cluster.local
  # port: 5432
  # database: stalwart
  # user: stalwart
  # password:
  #   "@type": EnvironmentVariable
  #   variableName: STALWART_DATA_PASSWORD

# Self-managed env Secret. When `secrets.create: true`, the chart renders a
# Secret from `secrets.env` and adds it to the pod's envFrom. Use this for
# bootstrap-time credentials (recovery admin, DB password, S3 keys).
#
# For production, prefer external-secrets.io / SealedSecrets / Vault Agent:
# leave `secrets.create: false` and reference the externally-managed Secret
# via `envFrom: [{ secretRef: { name: my-stalwart-secrets } }]`.
secrets:
  create: false
  # Plain key/value pairs. Stored as Opaque Secret stringData entries.
  env: {}
  #   STALWART_DATA_PASSWORD: changeme
  #   STALWART_BLOB_ACCESS_KEY: changeme
  #   STALWART_BLOB_SECRET_KEY: changeme

# Recovery mode — flips STALWART_RECOVERY_MODE=1 on the pod. Pair with a
# STALWART_RECOVERY_ADMIN env var (single `user:password` string) supplied via
# `secrets.env.STALWART_RECOVERY_ADMIN` or an external Secret in `envFrom`.
# Used for first-time bootstrap (run `stalwart-cli apply` against the pod's
# port 8080, then provision a real admin Principal). Disable afterwards.
recoveryAdmin:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables. Common ones:
#   STALWART_HOSTNAME — overrides hostname used in cluster identity
#   STALWART_PUBLIC_URL — base URL shown to clients
#   STALWART_ROLE — cluster role name (for HA)
#   STALWART_PUSH_SHARD — push-notification shard ordinal
env: []

# Extra envFrom sources. Use this to pull credentials from externally-managed
# Secrets (external-secrets.io, SealedSecrets, Vault Agent) rather than baking
# them into `secrets.env`.
envFrom: []
#   - secretRef:
#       name: stalwart-platform-wiring

extraVolumes: []
extraVolumeMounts: []
